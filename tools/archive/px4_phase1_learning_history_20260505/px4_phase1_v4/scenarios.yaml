run_name: px4_phase1_standard_vtol_rate_setpoint_v4
px4_dir: ~/src/PX4-Autopilot
vehicle: gz_standard_vtol
connection_url: udpin://0.0.0.0:14540
output_root: ~/px4_datasets

defaults:
  headless: true
  launch_wait_s: 25.0
  duration_s: 45.0
  sample_period_s: 0.05
  arm: true
  takeoff: true
  takeoff_altitude_m: 25.0
  hold_after_takeoff_s: 8.0
  analysis_start_s: 8.0
  analysis_end_s: null
  maneuver_type: offboard_attitude_rate
  start_offboard_after_takeoff: true
  offboard_initial_hold_s: 2.0
  setpoint_rate_hz: 40.0
  nominal_thrust: 0.62
  metadata:
    project_phase: phase1_rate_setpoint_data
    platform: px4_gazebo_standard_vtol
    regime: multicopter_hover_rate_setpoint_excitation
    control_layer: "PINN-MPC future layer -> PX4 rate controller setpoint"
    disturbance_family: none
    disturbance_severity: 0.0
    note: "v4 nominal rate/thrust setpoint collection. No disturbance injection and no PINN training."

scenarios:
  - name: R0_rate_hover_hold
    duration_s: 35.0
    rate_setpoints:
      - {label: hover_hold, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 0.0, thrust: 0.62, hold_s: 22.0}

  - name: R1_pitch_rate_doublet_small
    duration_s: 50.0
    rate_setpoints:
      - {label: pre_hold, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 0.0, thrust: 0.62, hold_s: 5.0}
      - {label: pitch_up_rate, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 12.0, yaw_rate_deg_s: 0.0, thrust: 0.62, hold_s: 1.2}
      - {label: neutral_1, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 0.0, thrust: 0.62, hold_s: 2.0}
      - {label: pitch_down_rate, roll_rate_deg_s: 0.0, pitch_rate_deg_s: -12.0, yaw_rate_deg_s: 0.0, thrust: 0.62, hold_s: 1.2}
      - {label: recovery, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 0.0, thrust: 0.62, hold_s: 16.0}

  - name: R2_roll_rate_doublet_small
    duration_s: 50.0
    rate_setpoints:
      - {label: pre_hold, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 0.0, thrust: 0.62, hold_s: 5.0}
      - {label: roll_right_rate, roll_rate_deg_s: 12.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 0.0, thrust: 0.62, hold_s: 1.2}
      - {label: neutral_1, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 0.0, thrust: 0.62, hold_s: 2.0}
      - {label: roll_left_rate, roll_rate_deg_s: -12.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 0.0, thrust: 0.62, hold_s: 1.2}
      - {label: recovery, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 0.0, thrust: 0.62, hold_s: 16.0}

  - name: R3_yaw_rate_step_small
    duration_s: 50.0
    rate_setpoints:
      - {label: pre_hold, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 0.0, thrust: 0.62, hold_s: 5.0}
      - {label: yaw_right_rate, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 18.0, thrust: 0.62, hold_s: 3.0}
      - {label: neutral_1, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 0.0, thrust: 0.62, hold_s: 4.0}
      - {label: yaw_left_rate, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: -18.0, thrust: 0.62, hold_s: 3.0}
      - {label: recovery, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 0.0, thrust: 0.62, hold_s: 12.0}

  - name: R4_thrust_step_small
    duration_s: 50.0
    rate_setpoints:
      - {label: pre_hold, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 0.0, thrust: 0.62, hold_s: 5.0}
      - {label: thrust_up, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 0.0, thrust: 0.67, hold_s: 2.0}
      - {label: neutral_1, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 0.0, thrust: 0.62, hold_s: 4.0}
      - {label: thrust_down, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 0.0, thrust: 0.57, hold_s: 2.0}
      - {label: recovery, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 0.0, thrust: 0.62, hold_s: 12.0}

  - name: R5_combined_smooth_sequence
    duration_s: 70.0
    rate_setpoints:
      - {label: pre_hold, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 0.0, thrust: 0.62, hold_s: 5.0}
      - {label: pitch_up_thrust_up, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 8.0, yaw_rate_deg_s: 0.0, thrust: 0.65, hold_s: 1.5}
      - {label: roll_right, roll_rate_deg_s: 8.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 0.0, thrust: 0.62, hold_s: 1.5}
      - {label: yaw_right, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 12.0, thrust: 0.62, hold_s: 2.0}
      - {label: pitch_down_thrust_down, roll_rate_deg_s: 0.0, pitch_rate_deg_s: -8.0, yaw_rate_deg_s: 0.0, thrust: 0.59, hold_s: 1.5}
      - {label: roll_left, roll_rate_deg_s: -8.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 0.0, thrust: 0.62, hold_s: 1.5}
      - {label: recovery, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 0.0, thrust: 0.62, hold_s: 20.0}
