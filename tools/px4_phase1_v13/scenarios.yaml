  - name: N00_hover_hold_0p5192
    duration_s: 30.0
    rate_setpoints:
      - {label: hover_hold, roll_rate_deg_s: 0.0, pitch_rate_deg_s: 0.0, yaw_rate_deg_s: 0.0, thrust: 0.5192, hold_s: 22.0}

  - name: N01_pitch_rate_doublet_5dps
