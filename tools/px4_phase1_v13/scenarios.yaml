run_name: px4_phase1_standard_vtol_nominal_rate_dataset_v13_imu_aux
px4_dir: ~/src/PX4-Autopilot
vehicle: gz_standard_vtol
connection_url: udpin://0.0.0.0:14540
output_root: ~/px4_datasets

defaults:
  headless: true
  launch_wait_s: 25.0
  duration_s: 35.0
  sample_period_s: 0.05
  arm: true
  takeoff: true
  takeoff_altitude_m: 25.0
  hold_after_takeoff_s: 3.0
  wait_for_takeoff_altitude: true
  takeoff_ready_altitude_m: 22.0
  takeoff_ready_timeout_s: 45.0
  wait_for_hover_ready: true
  hover_ready_target_altitude_m: 25.0
  hover_ready_altitude_tolerance_m: 1.0
  hover_ready_max_abs_vz_m_s: 0.25
  hover_ready_stable_s: 2.0
  hover_ready_timeout_s: 60.0
  analysis_start_s: 0.0
  analysis_end_s: null
  maneuver_type: offboard_attitude_rate
  start_offboard_after_takeoff: true
  offboard_initial_hold_s: 0.5
  setpoint_rate_hz: 40.0
  nominal_thrust: 0.5192
  safety:
    enabled: true
    min_altitude_m: 5.0
    max_altitude_m: 90.0
    max_abs_roll_deg: 55.0
    max_abs_pitch_deg: 55.0
    max_abs_rate_deg_s: 240.0
  metadata:
    project_phase: phase1_nominal_rate_dynamics_dataset
    platform: px4_gazebo_standard_vtol
    regime: multicopter_hover_rate_setpoint_excitation
    control_layer: "PINN-MPC future layer -> PX4 rate controller setpoint"
    disturbance_family: none
    disturbance_severity: 0.0
    hover_thrust: 0.5192
    note: "v13 keeps v12 scenarios and additionally logs MAVSDK IMU acceleration plus finite-difference acceleration/rate-derivative columns."

